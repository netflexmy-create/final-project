<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>파스텔 메모리 매칭 게임 (Memory Matching Game)</title>
  <!-- 구글 폰트 불러오기 (Outfit: 깔끔하고 모던한 영문/숫자용, Noto Sans KR: 가독성 높은 한글용) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <style>
    /* ==========================================
       1. 디자인 시스템 & 변수 정의 (CSS Variables)
       ========================================== */
    :root {
      /* 기본 테마: 라벤더 퍼플 (Classic Lilac) */
      --primary-color: #8EC5FC;      /* 주요 파스텔 블루 */
      --secondary-color: #E0C3FC;    /* 주요 파스텔 연보라 */
      --accent-color: #7F00FF;       /* 강조색 (포인트 텍스트/보라색) */
      --correct-color: #BFFCC6;      /* 일치 시 초록색 피드백 */
      --incorrect-color: #FFC6FF;    /* 불일치 시 마젠타 피드백 */
      --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); /* 전체 배경 그라디언트 */
      
      /* 플로팅 블롭 배경색 */
      --blob-1-color: #E0C3FC;
      --blob-2-color: #8EC5FC;
      --blob-3-color: #FFB7B2;
      
      /* 글자 색상 */
      --text-dark: #2d3748;
      --text-muted: #718096;
      --text-light: #ffffff;
      
      /* 카드 뒷면 격자 패턴용 투명 파스텔 보라 */
      --primary-color-light: rgba(142, 197, 252, 0.2);
    }

    /* 민트 그린 테마 (Fresh Mint) */
    body[data-theme="mint"] {
      --primary-color: #A8E6CF;
      --secondary-color: #81ecec;
      --accent-color: #00b894;
      --correct-color: #d1f7d6;
      --incorrect-color: #ffecd9;
      --bg-gradient: linear-gradient(135deg, #e6f7f2 0%, #b8e6d9 100%);
      
      --blob-1-color: #A8E6CF;
      --blob-2-color: #81ecec;
      --blob-3-color: #dff9fb;
      
      --primary-color-light: rgba(168, 230, 207, 0.3);
    }

    /* 피치 코랄 테마 (Sweet Peach) */
    body[data-theme="peach"] {
      --primary-color: #FFB7B2;
      --secondary-color: #FFDAC1;
      --accent-color: #ff7675;
      --correct-color: #e3fcd6;
      --incorrect-color: #ffd2d2;
      --bg-gradient: linear-gradient(135deg, #fff3f0 0%, #ffd1c4 100%);
      
      --blob-1-color: #FFB7B2;
      --blob-2-color: #FFDAC1;
      --blob-3-color: #FFF5EB;
      
      --primary-color-light: rgba(255, 183, 178, 0.3);
    }

    /* 초기화 및 기본 스타일 */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', 'Noto Sans KR', sans-serif;
      background: var(--bg-gradient);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-dark);
      overflow-x: hidden;
      padding: 20px;
      transition: background 0.5s ease; /* 테마 전환 시 부드러운 배경 교체 */
    }

    /* ==========================================
       2. 무드 있는 유기형 플로팅 배경 블롭 (Floating Blobs)
       ========================================== */
    .blob-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      overflow: hidden;
      pointer-events: none;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.45;
      animation: floatBlob 20s infinite alternate ease-in-out;
      transition: background-color 0.5s ease;
    }

    .blob-1 {
      width: 450px;
      height: 450px;
      background-color: var(--blob-1-color);
      top: -10%;
      left: -10%;
      animation-duration: 25s;
    }

    .blob-2 {
      width: 550px;
      height: 550px;
      background-color: var(--blob-2-color);
      bottom: -15%;
      right: -10%;
      animation-duration: 32s;
      animation-delay: -6s;
    }

    .blob-3 {
      width: 380px;
      height: 380px;
      background-color: var(--blob-3-color);
      top: 35%;
      left: 45%;
      animation-duration: 22s;
      animation-delay: -11s;
    }

    @keyframes floatBlob {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(40px, -60px) scale(1.12); }
      66% { transform: translate(-30px, 30px) scale(0.92); }
      100% { transform: translate(0, 0) scale(1); }
    }

    /* ==========================================
       3. 메인 레이아웃 & 대시보드 (Layout & Dashboard)
       ========================================== */
    
    /* 대시보드(헤더+게임판) 유리에 가둔 듯한 Glassmorphism 효과 */
    .game-container {
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 28px;
      padding: 30px;
      width: 100%;
      max-width: 540px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: column;
      gap: 20px;
      animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* 헤더 영역 */
    .game-header {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* 과제 소속 표시 배지 */
    .project-subtitle {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--accent-color);
      letter-spacing: 0.2px;
      background: rgba(255, 255, 255, 0.7);
      padding: 5px 14px;
      border-radius: 20px;
      display: inline-block;
      margin: 0 auto;
      width: fit-content;
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
      transition: all 0.3s ease;
    }

    .game-title {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--accent-color), #FF007F);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 2px;
    }

    /* 테마 선택기 바 */
    .theme-selector {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 2px;
    }

    .theme-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid #ffffff;
      cursor: pointer;
      transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.2s;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.1);
      outline: none;
    }

    .theme-btn:hover {
      transform: scale(1.15);
    }

    .theme-btn.active {
      transform: scale(1.25);
      border-color: var(--accent-color);
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.8), 0 4px 10px rgba(0, 0, 0, 0.15);
    }

    /* 점수판 및 타이머 대시보드 */
    .dashboard {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      background: rgba(255, 255, 255, 0.45);
      padding: 12px 15px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .stat-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4px;
    }

    .stat-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 1.35rem;
      font-weight: 800;
      color: var(--text-dark);
      font-feature-settings: "tnum";
    }

    /* 개인 최고기록 서브 텍스트 */
    .stat-best {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--accent-color);
      margin-top: 2px;
      opacity: 0.85;
      letter-spacing: -0.2px;
    }

    /* 매치 프로그레스 진행 바 (가시성 대폭 상향) */
    .progress-container {
      grid-column: span 3;
      width: 100%;
      height: 8px;
      background: rgba(0, 0, 0, 0.05);
      border-radius: 10px;
      overflow: hidden;
      margin-top: 4px;
      position: relative;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
      border-radius: 10px;
      transition: width 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }

    /* 제어 버튼 행 */
    .control-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .btn {
      border: none;
      outline: none;
      cursor: pointer;
      font-family: inherit;
      font-weight: 700;
      border-radius: 14px;
      transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-reset {
      flex: 1;
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      color: var(--text-light);
      padding: 13px;
      font-size: 0.95rem;
      box-shadow: 0 4px 15px rgba(142, 197, 252, 0.25);
    }

    .btn-reset:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(142, 197, 252, 0.4);
    }

    .btn-reset:active {
      transform: translateY(0);
    }

    .btn-icon {
      width: 46px;
      height: 46px;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(0, 0, 0, 0.03);
      border-radius: 14px;
      color: var(--text-dark);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
    }

    .btn-icon:hover {
      background: #ffffff;
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.05);
    }

    /* ==========================================
       4. 게임 보드 & 카드 격자판 (Board & Cards)
       ========================================== */
    .game-board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      perspective: 1000px; /* 3D 플립 입체감 생성 */
      aspect-ratio: 1 / 1;
    }

    .card {
      position: relative;
      cursor: pointer;
      user-select: none;
      -webkit-user-drag: none;
      aspect-ratio: 1 / 1;
      outline: none;
      opacity: 0; /* 초기 딜링 전에는 숨김 */
    }

    /* 카드 딜링(순차 등장) 애니메이션 */
    .card.card-deal {
      animation: dealCard 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.15) forwards;
    }

    @keyframes dealCard {
      from {
        opacity: 0;
        transform: translateY(35px) scale(0.82) rotate(5deg);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1) rotate(0deg);
      }
    }

    .card-inner {
      position: absolute;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.25);
      border-radius: 18px;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.04);
    }

    .card:hover .card-inner {
      transform: translateY(-4px);
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.08);
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 18px;
      border: 2px solid #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.3s ease, background-color 0.3s ease;
    }

    /* 카드 뒷면: Polka dot 격자 무늬 */
    .card-back {
      background-color: #ffffff;
      background-image: radial-gradient(var(--primary-color-light) 22%, transparent 22%),
                        radial-gradient(var(--primary-color-light) 22%, transparent 22%);
      background-size: 14px 14px;
      background-position: 0 0, 7px 7px;
      color: var(--primary-color);
      transition: background-image 0.5s ease;
    }

    .card-back-icon {
      opacity: 0.65;
      transition: transform 0.3s ease, color 0.5s ease;
    }

    .card:hover .card-back-icon {
      transform: scale(1.15) rotate(15deg);
    }

    /* 카드 앞면 */
    .card-front {
      background-color: #ffffff;
      transform: rotateY(180deg);
      font-size: 2.2rem;
    }

    /* ==========================================
       5. 특수 상태 이펙트 (Match / Mismatch)
       ========================================== */
    
    /* 매치 성공: 통통 튀어오르는 스케일 연출 후 흐려진 상태(opacity) 고정 */
    .card.matched .card-inner {
      animation: matchPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.25) forwards;
    }
    
    .card.matched .card-front {
      background-color: var(--correct-color);
      border-color: rgba(255, 255, 255, 0.8);
    }

    /* 불일치: 좌우 쉐이크(흔들림) 피드백 */
    .card.incorrect .card-inner {
      animation: shake 0.6s ease-in-out;
    }

    .card.incorrect .card-front {
      background-color: var(--incorrect-color);
      border-color: rgba(255, 255, 255, 0.8);
    }

    /* ==========================================
       6. 결과 모달 (Result Modal Overlay)
       ========================================== */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      background: #ffffff;
      border-radius: 26px;
      padding: 40px 30px;
      width: 90%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.8);
      position: relative;
      overflow: hidden;
      transform: scale(0.85) translateY(30px);
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.2);
    }

    .modal-overlay.active .modal-content {
      transform: scale(1) translateY(0);
    }

    .confetti-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .modal-body {
      position: relative;
      z-index: 2;
    }

    .modal-badge {
      font-size: 3.5rem;
      margin-bottom: 12px;
      display: inline-block;
      animation: bounce 2s infinite ease-in-out;
    }

    /* 최고 신기록 갱신 축하 태그 */
    .new-record-tag {
      background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
      color: #ffffff;
      font-size: 0.75rem;
      font-weight: 800;
      padding: 6px 14px;
      border-radius: 30px;
      display: inline-block;
      margin-bottom: 12px;
      box-shadow: 0 4px 12px rgba(255, 165, 0, 0.3);
      animation: pulseGlow 1.5s infinite ease-in-out;
    }

    .modal-title {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--text-dark);
      margin-bottom: 6px;
    }

    .modal-subtitle {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-bottom: 25px;
    }

    /* 최종 성적 디스플레이 */
    .result-board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 30px;
    }

    .result-box {
      background: #f7fafc;
      padding: 12px 6px;
      border-radius: 16px;
      border: 1px solid #edf2f7;
    }

    .result-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-bottom: 6px;
      font-weight: 600;
    }

    .result-value {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--text-dark);
    }

    .btn-modal-reset {
      width: 100%;
      background: linear-gradient(135deg, var(--accent-color) 0%, #FF007F 100%);
      color: #ffffff;
      padding: 15px;
      font-size: 1.05rem;
      box-shadow: 0 4px 18px rgba(127, 0, 255, 0.25);
    }

    .btn-modal-reset:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 22px rgba(127, 0, 255, 0.4);
    }

    /* ==========================================
       7. 키프레임 애니메이션 정의 (Animations)
       ========================================== */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes matchPop {
      0% { transform: rotateY(180deg) scale(1); }
      40% { transform: rotateY(180deg) scale(1.15); }
      100% { transform: rotateY(180deg) scale(0.9); opacity: 0.35; pointer-events: none; }
    }

    @keyframes shake {
      0%, 100% { transform: rotateY(180deg) translateX(0); }
      20%, 60% { transform: rotateY(180deg) translateX(-8px); }
      40%, 80% { transform: rotateY(180deg) translateX(8px); }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes pulseGlow {
      0%, 100% { transform: scale(1); box-shadow: 0 4px 12px rgba(255, 165, 0, 0.3); }
      50% { transform: scale(1.06); box-shadow: 0 6px 18px rgba(255, 165, 0, 0.5); }
    }

    /* ==========================================
       8. 반응형 레이아웃 쿼리 (Responsive)
       ========================================== */
    @media (max-width: 480px) {
      .game-container {
        padding: 20px 15px;
        gap: 15px;
      }
      
      .game-title {
        font-size: 1.6rem;
      }

      .dashboard {
        padding: 10px 8px;
        gap: 8px;
      }

      .stat-value {
        font-size: 1.1rem;
      }

      .stat-label {
        font-size: 0.65rem;
      }

      .game-board {
        gap: 9px;
      }

      .card-front {
        font-size: 1.75rem;
      }
      
      .card-inner {
        border-radius: 12px;
      }
      .card-front, .card-back {
        border-radius: 12px;
      }

      .result-board {
        gap: 6px;
      }
      .result-value {
        font-size: 1.05rem;
      }
    }
  </style>
</head>
<body>

  <!-- 은은하게 떠다니며 겹쳐 보이는 무드 배경 블롭들 -->
  <div class="blob-container">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- 메인 보드 컨테이너 -->
  <div class="game-container">
    
    <!-- 상단 헤더 -->
    <header class="game-header">
      <div class="project-subtitle">연성대학교 쉽게배우는AI활용콘텐츠제작 기말과제</div>
      <h1 class="game-title">Pastel Memory</h1>
      
      <!-- 테마 교체 팔레트 바 -->
      <div class="theme-selector" aria-label="테마 선택기">
        <button class="theme-btn active" data-theme="lilac" style="background: linear-gradient(135deg, #E0C3FC, #8EC5FC);" title="Classic Lilac"></button>
        <button class="theme-btn" data-theme="mint" style="background: linear-gradient(135deg, #A8E6CF, #81ecec);" title="Fresh Mint"></button>
        <button class="theme-btn" data-theme="peach" style="background: linear-gradient(135deg, #FFB7B2, #FFDAC1);" title="Sweet Peach"></button>
      </div>

      <!-- 실시간 통계 및 로컬스토리지 최고기록 보드 -->
      <div class="dashboard">
        <div class="stat-box">
          <span class="stat-label">Time</span>
          <span class="stat-value" id="timer">00:00</span>
          <span class="stat-best" id="bestTimeDisplay">Best: --:--</span>
        </div>
        <div class="stat-box">
          <span class="stat-label">Flips</span>
          <span class="stat-value" id="flips">0</span>
          <span class="stat-best" id="bestFlipsDisplay">Best: --</span>
        </div>
        <div class="stat-box">
          <span class="stat-label">Accuracy</span>
          <span class="stat-value" id="accuracy">0%</span>
          <span class="stat-best" id="bestAccuracyDisplay">Best: --%</span>
        </div>

        <!-- 매칭 진행 프로그레스 바 -->
        <div class="progress-container">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>

      <!-- 보조 조작 키 바 -->
      <div class="control-row">
        <button class="btn btn-icon" id="soundBtn" aria-label="사운드 조절">
          <!-- 스피커 ON -->
          <svg id="soundOnIcon" viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
            <path d="M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18,19.86 21,16.28 21,12C21,7.72 18,4.14 14,3.23M16.5,12C16.5,10.23 15.5,8.71 14,7.97V16C15.5,15.29 16.5,13.77 16.5,12M3,9V15H7L12,20V4L7,9H3Z"/>
          </svg>
          <!-- 스피커 OFF -->
          <svg id="soundOffIcon" viewBox="0 0 24 24" width="22" height="22" fill="currentColor" style="display: none;">
            <path d="M12,4L9.91,6.09L12,8.18M4.27,3L3,4.27L7.73,9H3V15H7L12,20V13.27L16.25,17.53C15.58,18.04 14.83,18.46 14,18.7V20.77C15.38,20.44 16.63,19.78 17.7,18.9L20.73,21.92L22,20.65L4.27,3M14,3.23V5.29C14.73,5.5 15.43,5.83 16.07,6.27L14.59,7.75C14.41,7.63 14.21,7.53 14,7.46V11.18L19,16.18C19,14.86 19,13.43 19,12C19,7.72 16,4.14 14,3.23M16.5,12C16.5,11.2 16.19,10.47 15.69,9.92L14,8.23V9.77L15.89,11.66C15.96,11.78 16.5,11.89 16.5,12Z"/>
          </svg>
        </button>
        <button class="btn btn-reset" id="resetBtn">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
            <path d="M17.65,6.35C16.2,4.9 14.21,4 12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20C15.73,20 18.84,17.45 19.73,14H17.65C16.83,16.33 14.61,18 12,18A6,6 0 0,1 6,12A6,6 0 0,1 12,6C13.66,6 15.14,6.69 16.22,7.78L13,11H20V4L17.65,6.35Z"/>
          </svg>
          다시 시작하기
        </button>
      </div>
    </header>

    <!-- 4x4 게임 카드 격자 배열 보드 -->
    <main class="game-board" id="board" aria-label="카드 게임 보드"></main>
    
    <!-- 하단 제작자 크레딧 -->
    <footer style="text-align: center; font-size: 0.75rem; font-weight: 600; color: var(--text-muted); opacity: 0.7; margin-top: 4px; letter-spacing: 0.3px;">
      제작자: 울과대 김민재
    </footer>
  </div>

  <!-- 결과 알림 모달 -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
      <!-- 캔버스 폭죽 폭발 그래픽 레이어 -->
      <canvas class="confetti-canvas" id="confettiCanvas"></canvas>
      
      <div class="modal-body">
        <span class="modal-badge">🏆</span>
        
        <!-- 신기록 갱신 축하 태그 (JS로 동적 제어) -->
        <div class="new-record-tag" id="newRecordTag" style="display: none;">👑 NEW RECORD! 신기록 달성</div>
        
        <h2 class="modal-title">축하합니다!</h2>
        <p class="modal-subtitle">모든 짝을 완벽히 매칭하셨습니다!</p>
        
        <!-- 클리어 지표 확인판 -->
        <div class="result-board">
          <div class="result-box">
            <div class="result-label">소요 시간</div>
            <div class="result-value" id="finalTime">00:00</div>
          </div>
          <div class="result-box">
            <div class="result-label">시도 횟수</div>
            <div class="result-value" id="finalFlips">0</div>
          </div>
          <div class="result-box">
            <div class="result-label">명중률</div>
            <div class="result-value" id="finalAccuracy">0%</div>
          </div>
        </div>

        <button class="btn btn-modal-reset" id="modalResetBtn">
          한 판 더 하기
        </button>
      </div>
    </div>
  </div>

  <!-- ==========================================
       9. 게임 제어 및 연출 알고리즘 스크립트
       ========================================== -->
  <script>
    /* -------------------------------------------
       [A] 상태 제어 변수들
       ------------------------------------------- */
    const cardEmojis = ['🍎', '🍋', '🍓', '🍇', '🍉', '🍒', '🥝', '🥑'];
    
    let cards = [];
    let firstCard = null;
    let secondCard = null;
    let isLockMode = false;
    let moves = 0;             // 뒤집기 완료 짝 시도 횟수 (2개 뒤집을 때마다 +1)
    let matchedPairs = 0;      // 맞춘 커플 수 (최대 8)
    
    // 타이머 모듈
    let isTimerActive = false;
    let startTime = null;
    let timerInterval = null;
    let currentSeconds = 0;

    // 사운드 합성 설정
    let isSoundOn = true;
    let audioCtx = null;

    // DOM 캐싱 리스트
    const board = document.getElementById('board');
    const flipsDisplay = document.getElementById('flips');
    const timerDisplay = document.getElementById('timer');
    const accuracyDisplay = document.getElementById('accuracy');
    const progressBar = document.getElementById('progressBar');
    
    const bestTimeDisplay = document.getElementById('bestTimeDisplay');
    const bestFlipsDisplay = document.getElementById('bestFlipsDisplay');
    const bestAccuracyDisplay = document.getElementById('bestAccuracyDisplay');
    
    const resetBtn = document.getElementById('resetBtn');
    const soundBtn = document.getElementById('soundBtn');
    const soundOnIcon = document.getElementById('soundOnIcon');
    const soundOffIcon = document.getElementById('soundOffIcon');
    
    const modalOverlay = document.getElementById('modalOverlay');
    const modalResetBtn = document.getElementById('modalResetBtn');
    const finalTimeDisplay = document.getElementById('finalTime');
    const finalFlipsDisplay = document.getElementById('finalFlips');
    const finalAccuracyDisplay = document.getElementById('finalAccuracy');
    const newRecordTag = document.getElementById('newRecordTag');
    const confettiCanvas = document.getElementById('confettiCanvas');

    /* -------------------------------------------
       [B] 로컬스토리지 개인 최고기록 데이터 연동
       ------------------------------------------- */
    // 로컬 스토리지에 기록된 데이터를 대시보드 스탯에 맵핑
    function loadBestRecords() {
      // 현재 적용되어 있는 테마 확인 (테마별 별도 랭킹 시스템 적용으로 다채로움 극대화)
      const currentTheme = document.body.getAttribute('data-theme') || 'lilac';
      
      const bestTime = localStorage.getItem(`pastel_best_time_${currentTheme}`);
      const bestFlips = localStorage.getItem(`pastel_best_flips_${currentTheme}`);
      const bestAccuracy = localStorage.getItem(`pastel_best_accuracy_${currentTheme}`);

      if (bestTime) {
        const min = Math.floor(bestTime / 60);
        const sec = bestTime % 60;
        bestTimeDisplay.textContent = `Best: ${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
      } else {
        bestTimeDisplay.textContent = 'Best: --:--';
      }

      if (bestFlips) {
        bestFlipsDisplay.textContent = `Best: ${bestFlips}회`;
      } else {
        bestFlipsDisplay.textContent = 'Best: --';
      }

      if (bestAccuracy) {
        bestAccuracyDisplay.textContent = `Best: ${bestAccuracy}%`;
      } else {
        bestAccuracyDisplay.textContent = 'Best: --%';
      }
    }

    /* -------------------------------------------
       [C] Web Audio API 사운드 합성 시스템
       ------------------------------------------- */
    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    function playTone(freqs, duration, type = 'sine') {
      if (!isSoundOn) return;
      initAudio();
      
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      
      osc.type = type;
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      
      const now = audioCtx.currentTime;
      gainNode.gain.setValueAtTime(0.12, now);
      gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);
      
      if (Array.isArray(freqs)) {
        const step = duration / freqs.length;
        freqs.forEach((freq, idx) => {
          osc.frequency.setValueAtTime(freq, now + idx * step);
        });
      } else {
        osc.frequency.setValueAtTime(freqs, now);
      }
      
      osc.start(now);
      osc.stop(now + duration);
    }

    const sound = {
      flip: () => playTone([350, 500], 0.08, 'sine'), // 톡 뒤집힐 때의 산뜻한 고음
      match: () => playTone([440, 554.37, 659.25, 880], 0.3, 'sine'), // 라장조 아르페지오 성공 화음
      mismatch: () => playTone([250, 160], 0.22, 'triangle'), // 실패 시 피용~ 꺾이는 삼각형 파형
      victory: () => { // 클리어 연주음
        const notes = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99, 1046.50];
        notes.forEach((freq, idx) => {
          setTimeout(() => playTone(freq, 0.25, 'sine'), idx * 80);
        });
      },
      newRecord: () => { // 신기록 수립 시 연주음 (상당히 유쾌함)
        const notes = [523.25, 659.25, 783.99, 1046.50, 783.99, 1046.50, 1318.51];
        notes.forEach((freq, idx) => {
          setTimeout(() => playTone(freq, 0.2, 'sine'), idx * 70);
        });
      }
    };

    /* -------------------------------------------
       [D] 게임 세팅 및 제어 상태 머신
       ------------------------------------------- */
    
    // 1. 새 게임 초기화
    function startNewGame() {
      // 모달 해제 및 파티클 중단
      modalOverlay.classList.remove('active');
      newRecordTag.style.display = 'none';
      stopConfetti();

      // 주요 수치 리셋
      firstCard = null;
      secondCard = null;
      isLockMode = false;
      moves = 0;
      matchedPairs = 0;
      currentSeconds = 0;
      
      // 대시보드 뷰 리셋
      flipsDisplay.textContent = '0';
      timerDisplay.textContent = '00:00';
      accuracyDisplay.textContent = '0%';
      progressBar.style.width = '0%';

      // 타이머 리셋
      clearInterval(timerInterval);
      isTimerActive = false;

      // 기록 로딩
      loadBestRecords();

      // 카드 생성 및 셔플 (Fisher-Yates)
      cards = [...cardEmojis, ...cardEmojis];
      for (let i = cards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [cards[i], cards[j]] = [cards[j], cards[i]];
      }

      // 카드 랜더링
      board.innerHTML = '';
      cards.forEach((emoji, index) => {
        const cardElement = document.createElement('div');
        cardElement.classList.add('card');
        cardElement.dataset.index = index;
        cardElement.dataset.emoji = emoji;
        cardElement.setAttribute('tabindex', '0');

        cardElement.innerHTML = `
          <div class="card-inner">
            <div class="card-back">
              <svg class="card-back-icon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                <path d="M12,17.27L18.18,21L16.54,13.97L22,9.24L14.81,8.62L12,2L9.19,8.62L2,9.24L7.45,13.97L5.82,21L12,17.27Z"/>
              </svg>
            </div>
            <div class="card-front">
              <span>${emoji}</span>
            </div>
          </div>
        `;

        // 카드 딜링(순차 딜레이 등장 효과) 스타일 부여
        // 16장의 카드가 순차적으로 차례차례 펼쳐지는 느낌의 프리미엄 효과
        cardElement.style.animationDelay = `${index * 35}ms`;
        cardElement.classList.add('card-deal');

        // 리스너 등록
        cardElement.addEventListener('click', () => handleCardClick(cardElement));
        cardElement.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            handleCardClick(cardElement);
          }
        });

        board.appendChild(cardElement);
      });
    }

    // 2. 카드 클릭 분기 처리
    function handleCardClick(cardElement) {
      if (isLockMode) return;
      if (cardElement.classList.contains('flipped') || cardElement.classList.contains('matched')) return;

      initAudio();

      if (!isTimerActive) {
        startTimer();
      }

      cardElement.classList.add('flipped');
      sound.flip();

      if (!firstCard) {
        firstCard = cardElement;
      } else {
        secondCard = cardElement;
        moves++;
        flipsDisplay.textContent = moves;
        
        // 실시간 명중률 계산 적용
        updateAccuracy();
        
        // 카드 쌍 일치 판정 개시
        checkCardMatch();
      }
    }

    // 3. 실시간 명중률 계산 연동
    function updateAccuracy() {
      const acc = Math.round((matchedPairs / moves) * 100);
      accuracyDisplay.textContent = `${acc}%`;
    }

    // 4. 일치 판정
    function checkCardMatch() {
      const isMatch = firstCard.dataset.emoji === secondCard.dataset.emoji;

      if (isMatch) {
        handleMatchSuccess();
      } else {
        handleMatchFailure();
      }
    }

    // 5. 매치 성공 처리
    function handleMatchSuccess() {
      const card1 = firstCard;
      const card2 = secondCard;

      firstCard = null;
      secondCard = null;

      card1.classList.add('matched');
      card2.classList.add('matched');

      matchedPairs++;
      
      // 실시간 명중률 재갱신 (성공 수치가 올랐으므로)
      updateAccuracy();
      
      // 프로그레스 바 너비 연동
      const percent = (matchedPairs / 8) * 100;
      progressBar.style.width = `${percent}%`;

      setTimeout(() => {
        sound.match();
      }, 100);

      if (matchedPairs === 8) {
        endGame();
      }
    }

    // 6. 매치 실패 처리
    function handleMatchFailure() {
      isLockMode = true;

      const card1 = firstCard;
      const card2 = secondCard;

      card1.classList.add('incorrect');
      card2.classList.add('incorrect');

      setTimeout(() => {
        sound.mismatch();
      }, 120);

      // 0.8초 후 원복
      setTimeout(() => {
        card1.classList.remove('flipped', 'incorrect');
        card2.classList.remove('flipped', 'incorrect');
        
        firstCard = null;
        secondCard = null;
        isLockMode = false;
      }, 800);
    }

    /* -------------------------------------------
       [E] 타이머 모듈
       ------------------------------------------- */
    function startTimer() {
      isTimerActive = true;
      startTime = Date.now();
      
      timerInterval = setInterval(() => {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        currentSeconds = elapsed;
        
        const minutes = Math.floor(elapsed / 60);
        const seconds = elapsed % 60;
        
        timerDisplay.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
      }, 1000);
    }

    /* -------------------------------------------
       [F] 게임 클리어 모달 출력 및 기록 보관
       ------------------------------------------- */
    function endGame() {
      clearInterval(timerInterval);
      isTimerActive = false;

      // 최종 통계값 계산
      const finalTimeFormatted = timerDisplay.textContent;
      const finalAcc = accuracyDisplay.textContent;

      finalTimeDisplay.textContent = finalTimeFormatted;
      finalFlipsDisplay.textContent = `${moves}회`;
      finalAccuracyDisplay.textContent = finalAcc;

      // 최고 기록 산출 및 갱신 체계
      const currentTheme = document.body.getAttribute('data-theme') || 'lilac';
      
      const recordTime = localStorage.getItem(`pastel_best_time_${currentTheme}`);
      const recordFlips = localStorage.getItem(`pastel_best_flips_${currentTheme}`);

      let isNewRecord = false;

      // 기존 기록이 없거나, 현재 시간이 더 적게 걸렸거나, 시간은 같지만 시도 횟수가 더 우수할 때
      if (!recordTime || 
          Number(currentSeconds) < Number(recordTime) || 
          (Number(currentSeconds) === Number(recordTime) && Number(moves) < Number(recordFlips))) {
        
        localStorage.setItem(`pastel_best_time_${currentTheme}`, currentSeconds);
        localStorage.setItem(`pastel_best_flips_${currentTheme}`, moves);
        localStorage.setItem(`pastel_best_accuracy_${currentTheme}`, Math.round((8 / moves) * 100));
        
        isNewRecord = true;
      }

      // 0.7초 지연 후 최종 모달 활성화 및 효과음 연주
      setTimeout(() => {
        if (isNewRecord) {
          newRecordTag.style.display = 'inline-block';
          sound.newRecord();
        } else {
          sound.victory();
        }
        modalOverlay.classList.add('active');
        startConfetti();
      }, 700);
    }

    /* -------------------------------------------
       [G] Canvas 모던 색종이 폭죽 파티클
       ------------------------------------------- */
    let confettiActive = false;
    let confettiParticles = [];
    const colors = ['#e0c3fc', '#8ec5fc', '#FFB7B2', '#BFFCC6', '#FFC6FF', '#FFDAC1'];
    let animationFrameId = null;

    function resizeConfettiCanvas() {
      confettiCanvas.width = confettiCanvas.parentElement.clientWidth;
      confettiCanvas.height = confettiCanvas.parentElement.clientHeight;
    }

    class ConfettiParticle {
      constructor() {
        this.x = Math.random() * confettiCanvas.width;
        this.y = Math.random() * -100 - 10;
        this.size = Math.random() * 8 + 4;
        this.color = colors[Math.floor(Math.random() * colors.length)];
        this.speedY = Math.random() * 3 + 2.5;
        this.speedX = Math.random() * 2.5 - 1.25;
        this.rotation = Math.random() * 360;
        this.rotationSpeed = Math.random() * 4 - 2;
      }

      update() {
        this.y += this.speedY;
        this.x += this.speedX;
        this.rotation += this.rotationSpeed;

        if (this.y > confettiCanvas.height) {
          this.y = -20;
          this.x = Math.random() * confettiCanvas.width;
        }
      }

      draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate((this.rotation * Math.PI) / 180);
        ctx.fillStyle = this.color;
        ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
        ctx.restore();
      }
    }

    function startConfetti() {
      resizeConfettiCanvas();
      confettiActive = true;
      confettiParticles = [];
      
      for (let i = 0; i < 90; i++) {
        confettiParticles.push(new ConfettiParticle());
      }
      
      const ctx = confettiCanvas.getContext('2d');
      
      function animate() {
        if (!confettiActive) return;
        ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
        
        confettiParticles.forEach(p => {
          p.update();
          p.draw(ctx);
        });
        
        animationFrameId = requestAnimationFrame(animate);
      }
      animate();
    }

    function stopConfetti() {
      confettiActive = false;
      if (animationFrameId) {
        cancelAnimationFrame(animationFrameId);
      }
      const ctx = confettiCanvas.getContext('2d');
      ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
    }

    window.addEventListener('resize', () => {
      if (confettiActive) {
        resizeConfettiCanvas();
      }
    });

    /* -------------------------------------------
       [H] 테마 스위치 이벤트 처리
       ------------------------------------------- */
    const themeButtons = document.querySelectorAll('.theme-btn');
    themeButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        initAudio();
        
        // 활성화 스타일 재정렬
        themeButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // 테마 속성값 바인딩
        const theme = btn.dataset.theme;
        if (theme === 'lilac') {
          document.body.removeAttribute('data-theme');
        } else {
          document.body.setAttribute('data-theme', theme);
        }

        // 테마별 최고기록 재조회
        loadBestRecords();
        if (isSoundOn) sound.flip();
      });
    });

    /* -------------------------------------------
       [I] 제어 버튼 및 초기화
       ------------------------------------------- */
    
    // 사운드 토글
    soundBtn.addEventListener('click', () => {
      isSoundOn = !isSoundOn;
      initAudio();
      
      if (isSoundOn) {
        soundOnIcon.style.display = 'block';
        soundOffIcon.style.display = 'none';
        sound.flip();
      } else {
        soundOnIcon.style.display = 'none';
        soundOffIcon.style.display = 'block';
      }
    });

    // 리셋
    resetBtn.addEventListener('click', () => {
      initAudio();
      if (isSoundOn) sound.flip();
      startNewGame();
    });

    // 모달창 리셋
    modalResetBtn.addEventListener('click', () => {
      initAudio();
      if (isSoundOn) sound.flip();
      startNewGame();
    });

    // 앱 기동
    window.addEventListener('DOMContentLoaded', startNewGame);

  </script>
